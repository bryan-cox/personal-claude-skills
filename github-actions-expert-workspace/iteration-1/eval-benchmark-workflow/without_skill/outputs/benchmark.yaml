name: Go Benchmarks

on:
  pull_request:
    branches:
      - main
      - "release-*"
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Run Go Benchmarks
    runs-on: [self-hosted, linux, x64]
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks on PR branch
        run: |
          make bench 2>&1 | tee /tmp/bench-pr.txt

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          clean: false

      - name: Run benchmarks on base branch
        run: |
          make bench 2>&1 | tee /tmp/bench-base.txt

      - name: Install benchstat
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare benchmarks
        id: benchstat
        run: |
          RESULT=$(benchstat /tmp/bench-base.txt /tmp/bench-pr.txt 2>&1 || true)
          {
            echo "result<<BENCHEOF"
            echo "$RESULT"
            echo "BENCHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post benchmark results as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## Benchmark Results

            <details>
            <summary>benchstat comparison (base vs PR)</summary>

            \`\`\`
            ${{ steps.benchstat.outputs.result }}
            \`\`\`

            </details>

            <details>
            <summary>PR branch raw output</summary>

            \`\`\`
            ${require('fs').readFileSync('/tmp/bench-pr.txt', 'utf8')}
            \`\`\`

            </details>

            _Commit: ${{ github.event.pull_request.head.sha }}_
            `;

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## Benchmark Results';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
